# Development overrides — rebuild on code change, expose ports, dev settings
version: "3.9"

x-app-env: &app-env
  DB_HOST: postgres
  REDIS_URL: redis://:${REDIS_PASSWORD:-seminar_redis_pass}@redis:6379/0
  CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-seminar_redis_pass}@redis:6379/1
  CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-seminar_redis_pass}@redis:6379/2

services:
  app:
    build:
      target: builder   # Use builder stage (includes Poetry) for volume mount
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app          # Mount source for hot reload
    environment:
      <<: *app-env
      DJANGO_SETTINGS_MODULE: config.settings.dev
    ports:
      - "8000:8000"

  celery:
    command: celery -A config.celery worker --loglevel=debug --concurrency=1
    volumes:
      - .:/app
    environment:
      <<: *app-env
      DJANGO_SETTINGS_MODULE: config.settings.dev

  # No nginx in dev — app directly on port 8000
  nginx:
    profiles: ["production"]  # Only start nginx when profile=production
